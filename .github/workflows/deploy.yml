name: Deploy ContosoInsurance

on:
  push:
    branches: [main]
    paths:
      - 'src/ContosoInsurance/**'
      - 'infra/**'
  workflow_dispatch:
    inputs:
      provision:
        description: Run azd provision for first-time or manual infrastructure bootstrap.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build, test, and deploy
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # Set AZURE_ENV_NAME in repo/environment vars (for example: contoso-insurance-team3).
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      # Expected repo/environment var value: rg-swo-gh-hackathon-team3.
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZD_AUTH_TYPE: OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build solution
        working-directory: src/ContosoInsurance
        run: dotnet build ContosoInsurance.sln --configuration Release

      - name: Test solution
        working-directory: src/ContosoInsurance
        run: dotnet test ContosoInsurance.sln --configuration Release --no-build

      # Deploy secrets/vars (AZURE_CLIENT_ID etc.) aren't configured yet in this repo — skip the
      # Azure steps instead of failing the whole run until OIDC federation is set up. Once the
      # secrets/vars below are added, these steps activate automatically on the next push.
      - name: Check Azure deploy secrets are configured
        id: azure-config
        run: |
          if [ -n "${AZURE_CLIENT_ID:-}" ] && [ -n "${AZURE_TENANT_ID:-}" ] && [ -n "${AZURE_SUBSCRIPTION_ID:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Azure login/deploy — AZURE_CLIENT_ID/AZURE_TENANT_ID/AZURE_SUBSCRIPTION_ID secrets are not set on this repo yet. See docs/README-DEPLOY.md."
          fi

      # OIDC exchanges GitHub's short-lived identity token for Azure access, so no client secret is required.
      - name: Login to Azure with OIDC
        if: steps.azure-config.outputs.configured == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Developer CLI
        if: steps.azure-config.outputs.configured == 'true'
        uses: Azure/setup-azd@v2

      # azd has its own auth session, separate from azure/login's az CLI session, and also needs
      # to be told which app registration/tenant to federate as.
      - name: Login azd with OIDC
        if: steps.azure-config.outputs.configured == 'true'
        run: azd auth login --client-id "$AZURE_CLIENT_ID" --tenant-id "$AZURE_TENANT_ID" --federated-credential-provider github

      # azd needs an active environment in CI, so re-select it when it exists or create it once from repo variables.
      - name: Select or create azd environment
        if: steps.azure-config.outputs.configured == 'true'
        working-directory: src/ContosoInsurance
        env:
          AZURE_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
          AZURE_RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
          AZD_AUTH_TYPE: ${{ env.AZD_AUTH_TYPE }}
        run: |
          set -euo pipefail
          AZURE_RESOURCE_GROUP="${AZURE_RESOURCE_GROUP:-rg-swo-gh-hackathon-team3}"
          if azd env select "$AZURE_ENV_NAME" --no-prompt; then
            echo "Selected existing azd environment: $AZURE_ENV_NAME"
          else
            azd env new "$AZURE_ENV_NAME" --location "$AZURE_LOCATION" --subscription "$AZURE_SUBSCRIPTION_ID" --no-prompt
          fi
          azd env set AZURE_LOCATION "$AZURE_LOCATION"
          azd env set AZURE_RESOURCE_GROUP "$AZURE_RESOURCE_GROUP"
          azd env set AZURE_SUBSCRIPTION_ID "$AZURE_SUBSCRIPTION_ID"

      # Keep first-time infrastructure creation manual so regular main pushes only redeploy the app.
      # `azd provision` validates at subscription scope even for a resourceGroup-scoped template
      # (a known azd behavior), which this hackathon SP/user only have RG-scoped permissions for.
      # Deploy directly with `az deployment group create` (RG-scope only, matches our actual
      # permissions). Outputs are bridged into the azd environment separately, in the always-run
      # step below, since app-only deploys need them too and shouldn't require re-provisioning.
      - name: Provision Azure infrastructure
        if: ${{ steps.azure-config.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.provision == 'true' }}
        working-directory: src/ContosoInsurance
        env:
          AZURE_RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
        run: |
          set -euo pipefail
          DEPLOYMENT_NAME="azd-${AZURE_ENV_NAME}"
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$DEPLOYMENT_NAME" \
            --template-file ../../infra/main.bicep \
            --parameters ../../infra/main.bicepparam \
            --output none

      # `azd deploy <service>` (used below, one service at a time to avoid OOM) needs
      # AZURE_CONTAINER_REGISTRY_ENDPOINT and friends in its local azd env, but that local env is
      # never persisted between CI runs (fresh checkout every time) — it's only populated when the
      # "Provision Azure infrastructure" step above actually runs. Bridge outputs from the *existing*
      # deployment (created once via provision) into azd env on every run, regardless of whether we
      # just provisioned, so ordinary app-only deploys keep working without re-provisioning.
      - name: Load Azure infra outputs into azd environment
        if: steps.azure-config.outputs.configured == 'true'
        working-directory: src/ContosoInsurance
        env:
          AZURE_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
          AZURE_RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
          AZD_AUTH_TYPE: ${{ env.AZD_AUTH_TYPE }}
        run: |
          set -euo pipefail
          DEPLOYMENT_NAME="azd-${AZURE_ENV_NAME}"

          # `az deployment group show`'s outputs come back with mangled key casing for
          # SCREAMING_SNAKE_CASE names (confirmed: the compiled ARM template has the correct
          # AZURE_CONTAINER_REGISTRY_ENDPOINT-style keys, but the deployment-show API response
          # does not) -- match case-insensitively against the known output names from
          # infra/main.bicep rather than trusting the returned casing verbatim.
          python3 - "$AZURE_RESOURCE_GROUP" "$DEPLOYMENT_NAME" <<'PYEOF' > azd-outputs.env
          import json
          import subprocess
          import sys

          rg, deployment_name = sys.argv[1], sys.argv[2]
          result = subprocess.run(
              [
                  "az", "deployment", "group", "show",
                  "--resource-group", rg,
                  "--name", deployment_name,
                  "--query", "properties.outputs",
                  "-o", "json",
              ],
              check=True,
              capture_output=True,
              text=True,
          )
          outputs = {k.upper(): v["value"] for k, v in json.loads(result.stdout).items()}

          expected_names = [
              "AZURE_CONTAINER_REGISTRY_ENDPOINT",
              "AZURE_CONTAINER_REGISTRY_NAME",
              "AZURE_RESOURCE_GROUP",
              "APPLICATIONINSIGHTS_CONNECTION_STRING",
              "AZURE_SQL_SERVER_FQDN",
              "AZURE_SQL_DATABASE_NAME",
              "AZURE_STORAGE_ACCOUNT_NAME",
              "AZURE_KEY_VAULT_URI",
              "AZURE_KEY_VAULT_NAME",
              "AZURE_MANAGED_IDENTITY_CLIENT_ID",
              "WEB_URI",
              "SERVICES_URI",
              "WORKER_APP_NAME",
          ]
          for name in expected_names:
              if name in outputs:
                  print(f"{name}={outputs[name]}")
              else:
                  print(f"::warning::Deployment output {name} was not found", file=sys.stderr)
          PYEOF

          while IFS='=' read -r key value; do
            [ -n "$key" ] || continue
            azd env set "$key" "$value"
          done < azd-outputs.env
          rm -f azd-outputs.env

      - name: Deploy application
        if: steps.azure-config.outputs.configured == 'true'
        working-directory: src/ContosoInsurance
        env:
          AZURE_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ env.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ env.AZURE_LOCATION }}
          AZURE_RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
          AZD_AUTH_TYPE: ${{ env.AZD_AUTH_TYPE }}
        run: |
          set -euo pipefail
          # `azd deploy` (no args) packages/builds all three services' Docker images
          # concurrently. Each build stage pulls in the full dotnet/sdk:9.0 image and
          # runs its own dotnet restore/publish; three of these in parallel exceed the
          # GitHub-hosted runner's ~7GB RAM and the OOM killer kills a build process
          # (surfaces as "building image: signal: killed" with no compiler error).
          # Deploy one service at a time instead so only one Docker build runs at once.
          for service in contosoinsurance-services contosoinsurance-worker contosoinsurance-web; do
            azd deploy "$service" --no-prompt
          done
