name: Progress Tracker (GitHub Pages)

on:
  # Rebuild the tracker on every branch that feeds it, so the live page stays
  # current without waiting on a manual workflow_dispatch: main (checkpoints/
  # merges) as well as the three track branches and integration (day-of
  # progress). The scan step itself reads every track/* branch fresh via
  # `git fetch` below regardless of which branch triggered the run.
  #
  # Only `main` is allowed to actually *deploy* to `github-pages` (see the
  # `deploy` job's `if:` below) — that environment's branch-restriction only
  # permits deploys from `main`, so a push to track/*/integration reruns the
  # `build` job (fresh artifact, harmless) but the `deploy` job is skipped
  # rather than hard-failing. Previously this was solved by only triggering
  # on `main`, but that silently stopped the tracker from reflecting track
  # branch progress between merges — see docs/learnings.md.
  push:
    branches: [main, 'track/**', integration]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all remote branches (track/*, integration)
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Generate tracker-status.js
        shell: pwsh
        run: ./docs/scan-progress.ps1

      - name: Upload Pages artifact (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    # Guard against the `github-pages` environment's branch-restricted deploys:
    # it only permits deployments from `main`, so a workflow_dispatch or push
    # on any other branch would otherwise hard-fail this job (red X) even
    # though the `build` job above succeeded. Skip it gracefully instead.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
