name: Progress Tracker (GitHub Pages)

on:
  # Only main pushes trigger the tracker rebuild+deploy: the scan step itself
  # reads every track/* branch fresh via `git fetch` below, and the `deploy`
  # job's `github-pages` environment only allows deploys from `main` anyway,
  # so triggering on track/* pushes just produced noisy failed runs there.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-flight production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all remote branches (track/*, integration)
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Generate tracker-status.js
        shell: pwsh
        run: ./docs/scan-progress.ps1

      - name: Upload Pages artifact (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
