analysisCoverage: full
java:
  assessmentDomains:
  - java-upgrade
  - cloud-readiness
  - security
  targetRuntime: openjdk25
  targetComputeServices:
  - azure-appservice
  - azure-aks
  - azure-container-apps
  targetOS:
  - linux
  - windows
  enableContainerization: true
  minimumCveSeverity: high
dotnet:
  assessmentDomains:
  - dotnet-upgrade
  - cloud-readiness
  targetRuntime: net9.0
  targetComputeServices:
  - Any
