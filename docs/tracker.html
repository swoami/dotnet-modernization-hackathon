<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Legacy Breakers — Progress</title>
<script>
  (() => {
    const param = new URLSearchParams(window.location.search).get("clawpilotTheme");
    const theme =
      param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<style>
:root {
  color-scheme: light;
  --cp-bg: #f7f4ef;
  --cp-bg-elevated: #fcfbf8;
  --cp-surface: #ffffff;
  --cp-surface-soft: #f5f5f5;
  --cp-border: #dedede;
  --cp-border-strong: #919191;
  --cp-text: #242424;
  --cp-text-muted: #5c5c5c;
  --cp-text-soft: #6f6f6f;
  --cp-accent: #b11f4b;
  --cp-accent-hover: #9a1a41;
  --cp-accent-soft: rgba(177, 31, 75, 0.08);
  --cp-accent-fg: #ffffff;
  --cp-success: #16a34a;
  --cp-danger: #dc2626;
  --cp-warning: #f59e0b;
  --cp-link: #0078d4;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
  --cp-overlay: rgba(255, 255, 255, 0.8);
  --cp-panel: rgba(255, 255, 255, 0.86);
  --cp-panel-strong: rgba(255, 255, 255, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.55);
  --cp-highlight: rgba(177, 31, 75, 0.12);
}
html[data-theme="dark"] {
  color-scheme: dark;
  --cp-bg: #3d3b3a;
  --cp-bg-elevated: #343231;
  --cp-surface: #292929;
  --cp-surface-soft: #2e2e2e;
  --cp-border: #474747;
  --cp-border-strong: #5f5f5f;
  --cp-text: #dedede;
  --cp-text-muted: #919191;
  --cp-text-soft: #b0b0b0;
  --cp-accent: #fd8ea1;
  --cp-accent-hover: #fb7b91;
  --cp-accent-soft: rgba(253, 142, 161, 0.14);
  --cp-accent-fg: #1a1a1a;
  --cp-success: #4ade80;
  --cp-danger: #f87171;
  --cp-warning: #fbbf24;
  --cp-link: #4da6ff;
  --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
  --cp-overlay: rgba(41, 41, 41, 0.88);
  --cp-panel: rgba(41, 41, 41, 0.72);
  --cp-panel-strong: rgba(41, 41, 41, 0.96);
  --cp-sheen: rgba(255, 255, 255, 0.04);
  --cp-highlight: rgba(253, 142, 161, 0.12);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cp-bg);
  color: var(--cp-text);
  font-size: 14px;
  line-height: 1.45;
}
code { font-family: Consolas, "Courier New", Courier, monospace; }
main { max-width: 1300px; margin: 0 auto; padding: 24px; }
h1 { margin: 0; font-size: 20px; font-weight: 600; }
#syncBtn {
  font-size: 12px; font-weight: 600; margin-left: 12px; padding: 4px 10px;
  border-radius: 999px; border: 1px solid var(--cp-border-strong);
  background: var(--cp-surface); color: var(--cp-text); cursor: pointer;
}
#syncBtn:hover { background: var(--cp-surface-soft); }
#syncBtn:disabled { opacity: 0.6; cursor: default; }
.sub { color: var(--cp-text-muted); font-size: 12px; margin: 4px 0 16px 0; }
.overall {
  background: var(--cp-surface);
  border: 1px solid var(--cp-border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
  display: flex; align-items: center; gap: 16px;
}
.overall .pct { font-size: 32px; font-weight: 700; min-width: 90px; }
.overall .detail { color: var(--cp-text-muted); font-size: 12px; }
.bar {
  flex: 1; height: 10px; border-radius: 999px;
  background: var(--cp-surface-soft); overflow: hidden;
}
.bar > span { display: block; height: 100%; background: var(--cp-accent); transition: width .3s ease; }
.bar.full > span { background: var(--cp-success); }
.timeline {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px;
}
.slot {
  padding: 4px 10px; border-radius: 999px; font-size: 11px;
  border: 1px solid var(--cp-border); color: var(--cp-text-muted);
  background: var(--cp-surface);
}
.slot.now { background: var(--cp-accent); border-color: var(--cp-accent); color: var(--cp-accent-fg); font-weight: 600; }
.slot.past { opacity: 0.45; text-decoration: line-through; }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
@media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
.track {
  background: var(--cp-surface);
  border: 1px solid var(--cp-border);
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 0 2px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.14);
}
.track h2 { margin: 0; font-size: 15px; font-weight: 600; display: inline; }
.track .branch {
  font-family: Consolas, monospace; font-size: 11px;
  color: var(--cp-accent); background: var(--cp-accent-soft);
  padding: 2px 8px; border-radius: 6px;
}
.track .bar { margin: 10px 0 12px 0; }
.phase { margin: 12px 0 4px 0; font-size: 11px; font-weight: 600; color: var(--cp-text-soft); text-transform: uppercase; letter-spacing: 0.05em; }
.task {
  display: flex; gap: 8px; align-items: baseline;
  padding: 5px 6px; border-radius: 8px; font-size: 13px;
}
.task:hover { background: var(--cp-surface-soft); }
.task.done { color: var(--cp-text-soft); text-decoration: line-through; }
.task .mark { width: 16px; text-align: center; flex: none; }
.task .mark input { cursor: pointer; margin: 0; }
.task.done .mark { color: var(--cp-success); text-decoration: none; }
.foot { margin-top: 24px; color: var(--cp-text-soft); font-size: 12px; }
</style>
</head>
<body>
<main>
  <h1>Legacy Breakers — Progress <button id="syncBtn" type="button">⟳ Sync now</button></h1>
  <div class="sub" id="status">loading…</div>

  <div class="overall">
    <div class="pct" id="pct">0%</div>
    <div class="bar" id="obar"><span style="width:0%"></span></div>
    <div class="detail" id="detail"></div>
  </div>

  <div class="timeline" id="timeline"></div>

  <div class="grid" id="tracks"></div>

  <p class="foot">
    Tasks flip to ✓ automatically as branches are pushed — run
    <code>pwsh docs/scan-progress.ps1 -Watch -Fetch</code> on the facilitator laptop.
    Only the two “Assess” tasks are ticked by hand.
  </p>
</main>

<script>
const EVENT_DATE = "2026-07-14";

const AGENDA = [
  ["09:00", "09:30", "Kickoff"],
  ["09:30", "10:00", "Demo"],
  ["10:00", "10:15", "Split"],
  ["10:15", "12:30", "Sprint 1 — Upgrade"],
  ["12:30", "13:15", "Lunch + CP1"],
  ["13:15", "15:15", "Sprint 2 — Azure"],
  ["15:15", "15:30", "CP2"],
  ["15:30", "16:15", "Deploy"],
  ["16:15", "16:45", "Hardening"],
  ["16:45", "17:15", "Demo"],
  ["17:15", "17:30", "Retro"],
];

// manual: true → ticked by hand (stored in localStorage); otherwise repo-detected.
const TRACKS = [
  { name: "Track A — Web + API", branch: "track/a-web-api", phases: {
    "Sprint 1": [
      { id: "A1", t: "Assess Web + Services (appmod)", manual: true },
      { id: "A2", t: "SDK-style csproj, net9.0" },
      { id: "A3", t: "packages.config → PackageReference" },
      { id: "A4", t: "Drop log4net / old Newtonsoft" },
      { id: "A5", t: "Web.config → appsettings.json" },
      { id: "A6", t: "WebForms → Razor Pages" },
      { id: "A7", t: "WCF → minimal API /claims/{id}/score" },
      { id: "A8", t: "EF Core ContosoDbContext" },
      { id: "A9", t: "Cookie auth replaces Forms Auth" },
    ],
    "Sprint 2": [
      { id: "A10", t: "SQL via Managed Identity" },
      { id: "A11", t: "App Insights + ILogger" },
      { id: "A12", t: "Remove Trace.* calls" },
      { id: "A13", t: "/health endpoint" },
    ]}},
  { name: "Track B — Worker + Storage", branch: "track/b-worker-storage", phases: {
    "Sprint 1": [
      { id: "B1", t: "Assess Worker (appmod)", manual: true },
      { id: "B2", t: "SDK-style csproj, net9.0" },
      { id: "B3", t: "Drop ServiceBase + ProjectInstaller" },
      { id: "B4", t: "BackgroundService host" },
      { id: "B5", t: "PeriodicTimer loop" },
      { id: "B6", t: "App.config → appsettings.json" },
      { id: "B7", t: "ILogger in worker" },
    ],
    "Sprint 2": [
      { id: "B8", t: "Azure.Storage.Blobs + Azure.Identity" },
      { id: "B9", t: "Exports → Blob claim-exports" },
      { id: "B10", t: "IClaimDocumentStore; uploads → claim-docs" },
      { id: "B11", t: "App Insights (worker service)" },
      { id: "B12", t: "ExportLog row per export" },
    ]}},
  { name: "Track C — Platform", branch: "track/c-platform", phases: {
    "Sprint 1": [
      { id: "C1", t: "azd init → azure.yaml" },
      { id: "C2", t: "Dockerfiles (Web, Worker, Services)" },
      { id: "C3", t: "main.bicep: ACA, SQL, Storage, KV, MI" },
    ],
    "Sprint 2": [
      { id: "C4", t: "App Insights env var wired" },
      { id: "C5", t: "MI SQL connection env var" },
      { id: "C6", t: "Storage account env var" },
      { id: "C7", t: "Key Vault secret references" },
      { id: "C8", t: "GitHub Actions deploy (OIDC)" },
      { id: "C9", t: "README-DEPLOY.md" },
    ]}},
];

const KEY = "legacy-breakers-manual-v2";
let manual = {};
try { manual = JSON.parse(localStorage.getItem(KEY)) || {}; } catch { manual = {}; }
let repo = window.REPO_STATUS || null;

const allTasks = TRACKS.flatMap(tr => Object.values(tr.phases).flat());

function isDone(task) {
  if (task.manual) return !!manual[task.id];
  return !!(repo && repo.tasks && repo.tasks[task.id]);
}

function bar(done, total) {
  const pct = total ? Math.round(100 * done / total) : 0;
  return `<div class="bar ${pct === 100 ? "full" : ""}"><span style="width:${pct}%"></span></div>`;
}

function render() {
  // overall
  const done = allTasks.filter(isDone).length;
  const pct = Math.round(100 * done / allTasks.length);
  document.getElementById("pct").textContent = pct + "%";
  document.getElementById("obar").outerHTML = `<div class="bar ${pct === 100 ? "full" : ""}" id="obar"><span style="width:${pct}%"></span></div>`;
  document.getElementById("detail").textContent = `${done} of ${allTasks.length} tasks`;

  // timeline
  const today = new Date().toISOString().slice(0, 10);
  const mins = today < EVENT_DATE ? -1 : today > EVENT_DATE ? 1441 :
    new Date().getHours() * 60 + new Date().getMinutes();
  const toMin = s => +s.slice(0, 2) * 60 + +s.slice(3);
  document.getElementById("timeline").innerHTML = AGENDA.map(([s, e, n]) => {
    const cls = mins >= toMin(e) ? "past" : (mins >= toMin(s) ? "now" : "");
    return `<span class="slot ${cls}">${s} ${n}</span>`;
  }).join("");

  // tracks
  document.getElementById("tracks").innerHTML = TRACKS.map(tr => {
    const tasks = Object.values(tr.phases).flat();
    const d = tasks.filter(isDone).length;
    const phases = Object.entries(tr.phases).map(([ph, list]) => `
      <div class="phase">${ph}</div>
      ${list.map(task => {
        const dn = isDone(task);
        const mark = task.manual
          ? `<input type="checkbox" data-id="${task.id}" ${dn ? "checked" : ""}>`
          : (dn ? "✓" : "·");
        return `<div class="task ${dn ? "done" : ""}"><span class="mark">${mark}</span><span>${task.t}</span></div>`;
      }).join("")}`).join("");
    return `<div class="track">
      <h2>${tr.name}</h2> <span class="branch">${tr.branch}</span>
      ${bar(d, tasks.length)}
      ${phases}
    </div>`;
  }).join("");

  // status line
  const day = today < EVENT_DATE ? `event day: ${EVENT_DATE}` :
              today > EVENT_DATE ? "event finished" : "event day — live";
  const scan = repo
    ? `repo scan ${new Date(repo.generatedAt).toLocaleTimeString()}`
    : "repo scan not run yet";
  const lastSync = document.getElementById("status").dataset.lastSync;
  document.getElementById("status").textContent = `${day} • ${scan} • auto-refreshes every 60 s` +
    (lastSync ? ` • ${lastSync}` : "");
}

document.addEventListener("change", ev => {
  const id = ev.target.dataset.id;
  if (!id) return;
  manual[id] = ev.target.checked;
  localStorage.setItem(KEY, JSON.stringify(manual));
  render();
});

function loadRepoStatus(cb) {
  const s = document.createElement("script");
  s.src = "tracker-status.js?t=" + Date.now();
  const prevGeneratedAt = repo && repo.generatedAt;
  s.onload = () => {
    s.remove();
    if (window.REPO_STATUS) {
      repo = window.REPO_STATUS;
      render();
      cb && cb(true, repo.generatedAt !== prevGeneratedAt);
    } else {
      cb && cb(false);
    }
  };
  s.onerror = () => { s.remove(); cb && cb(false); };
  document.body.appendChild(s);
}

function syncNow() {
  const btn = document.getElementById("syncBtn");
  btn.disabled = true;
  btn.textContent = "⟳ Syncing…";
  loadRepoStatus((ok, changed) => {
    btn.disabled = false;
    btn.textContent = "⟳ Sync now";
    const now = new Date().toLocaleTimeString();
    const extra = !ok ? `sync failed at ${now} (tracker-status.js unreachable)`
      : changed ? `synced ${now} — updated`
      : `synced ${now} — no change since last scan`;
    document.getElementById("status").dataset.lastSync = extra;
    render();
  });
}

document.getElementById("syncBtn").addEventListener("click", syncNow);

setInterval(loadRepoStatus, 60_000);
loadRepoStatus();
render();
</script>
</body>
</html>
